<!DOCTYPE html>
<html>
<head>
    <title>Admin Vault Sync</title>
    <style>
        body {
            width: 350px;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: #f1f5f9;
        }
        h2 {
            margin-top: 0;
            color: #38bdf8;
            font-size: 1.25rem;
            border-bottom: 1px solid #1e293b;
            padding-bottom: 10px;
        }
        .field {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.875rem;
            color: #94a3b8;
        }
        input {
            width: 100%;
            padding: 8px 12px;
            background-color: #1e293b;
            border: 1px solid #334155;
            border-radius: 4px;
            color: #f1f5f9;
            box-sizing: border-box;
        }
        input:focus {
            outline: none;
            border-color: #38bdf8;
        }
        textarea {
            width: 100%;
            padding: 8px 12px;
            background-color: #1e293b;
            border: 1px solid #334155;
            border-radius: 4px;
            color: #f1f5f9;
            box-sizing: border-box;
            font-family: inherit;
            resize: vertical;
        }
        textarea:focus {
            outline: none;
            border-color: #38bdf8;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #0284c7;
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #0369a1;
        }
        button:disabled {
            background-color: #1e293b;
            color: #64748b;
            cursor: not-allowed;
        }
        #status, #setupStatus {
            margin-top: 15px;
            padding: 10px;
            border-radius: 4px;
            font-size: 0.875rem;
            display: none;
            word-break: break-all;
        }
        .success {
            display: block !important;
            background-color: rgba(34, 197, 94, 0.1);
            color: #4ade80;
            border: 1px solid rgba(34, 197, 94, 0.2);
        }
        .error {
            display: block !important;
            background-color: rgba(239, 68, 68, 0.1);
            color: #f87171;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }
        .info {
            display: block !important;
            background-color: rgba(56, 189, 248, 0.1);
            color: #7dd3fc;
            border: 1px solid rgba(56, 189, 248, 0.2);
        }
        .divider {
            border: none;
            border-top: 1px solid #1e293b;
            margin: 20px 0;
        }
        .checkbox-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
        }
        .checkbox-row label {
            margin-bottom: 0;
        }
        #keeperStatus {
            margin-top: 10px;
            font-size: 0.75rem;
            color: #64748b;
        }
    </style>
</head>
<body>
    <h2>Vault Sync Utility</h2>
    <div class="field">
        <label for="setupCode">Setup Code</label>
        <textarea id="setupCode" rows="3" placeholder="Paste the setup code from the admin panel"></textarea>
    </div>
    <button id="applySetupBtn">Apply Setup Code</button>
    <div id="setupStatus"></div>

    <hr class="divider">

    <button id="syncNowBtn" disabled>Sync Now</button>
    <div id="status"></div>

    <hr class="divider">

    <h2>Auto-Sync (Keeper)</h2>
    <div class="checkbox-row">
        <input type="checkbox" id="autoSyncEnabled">
        <label for="autoSyncEnabled">Enable Auto-Sync every 3 hours</label>
    </div>
    <p id="keeperStatus"></p>

    <script src="popup.js"></script>
</body>
</html>
